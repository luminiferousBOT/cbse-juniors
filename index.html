<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CBSE Prep | Master Your Subjects</title>
    <!-- Google Fonts for Anthropic Vibe (Crimson Pro for Serif, Inter for Sans-Serif) -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Crimson+Pro:wght@400;600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="layout">
        <!-- Sidebar Navigation -->
        <aside class="sidebar">
            <header class="logo">
                <h1>CBSE Prep</h1>
            </header>
            
            <nav class="nav-selection">
                <div class="filter-group">
                    <label for="class-select">Class</label>
                    <select id="class-select">
                        <option value="6" selected>Class VI</option>
                        <option value="7" disabled>Class VII (Coming Soon)</option>
                        <option value="8" disabled>Class VIII (Coming Soon)</option>
                    </select>
                </div>

                <div class="filter-group">
                    <label for="subject-select">Subject</label>
                    <select id="subject-select">
                        <option value="history" selected>History (Our Pasts - I)</option>
                        <option value="civics" disabled>Civics (Coming Soon)</option>
                        <option value="geography" disabled>Geography (Coming Soon)</option>
                    </select>
                </div>

                <div class="filter-group chapter-list-container">
                    <label>Chapters</label>
                    <ul id="chapter-list" class="chapter-list">
                        <!-- Chapter list will be dynamically populated here -->
                    </ul>
                </div>
            </nav>
        </aside>

        <!-- Main Content Area -->
        <main class="main-content">
            <header class="content-header">
                <h2 id="current-chapter-title">Select a Chapter</h2>
                <p id="current-chapter-subtitle">Choose a chapter from the sidebar to begin practicing rigorous MCQs.</p>
                <div class="progress-container" style="display: none;" id="progress-container">
                    <div class="progress-bar" id="progress-bar"></div>
                </div>
            </header>

            <div id="mcq-container" class="mcq-container">
                <!-- MCQs will be injected here -->
                <div class="empty-state">
                    <svg viewBox="0 0 24 24" width="48" height="48" stroke="currentColor" stroke-width="1.5" fill="none" stroke-linecap="round" stroke-linejoin="round">
                        <path d="M4 19.5v-15A2.5 2.5 0 0 1 6.5 2H20v20H6.5a2.5 2.5 0 0 1 0-5H20"></path>
                    </svg>
                    <p>Continuous learning leads to mastery.</p>
                </div>
            </div>
            
            <div id="quiz-completion" class="quiz-completion" style="display: none;">
                <h3>Chapter Completed</h3>
                <p>You have reviewed all questions for this chapter.</p>
                <button id="reset-btn" class="secondary-btn">Practice Again</button>
            </div>
            
        </main>
    </div>

    <script src="js/data.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
